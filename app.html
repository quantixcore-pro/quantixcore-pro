<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AstraQuant Labs</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #00ffcc;
  font-family: monospace;
}

header {
  padding: 15px;
  border-bottom: 1px solid #00ffcc;
}

#chat {
  height: 80vh;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 8px 0;
}

.user { color: #00ffff; }
.bot { color: #00ff99; }

#inputArea {
  display: flex;
  border-top: 1px solid #00ffcc;
}

input {
  flex: 1;
  padding: 12px;
  background: black;
  color: #00ffcc;
  border: none;
  outline: none;
}

button {
  padding: 12px;
  background: #00ffcc;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  🌑 AstraQuant Labs v1
</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Ask anything..." />
  <button onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");

// Load memory
chat.innerHTML = localStorage.getItem("astra_chat") || "";

function save() {
  localStorage.setItem("astra_chat", chat.innerHTML);
}

function add(text, cls) {
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
  save();
}

// 🧠 Basic AI logic
function brain(input) {
  input = input.toLowerCase();

  if (input.includes("hello")) return "Hello 👋 I am AstraQuant.";
  if (input.includes("who are you")) return "I am AstraQuant AI.";
  if (input.includes("time")) return new Date().toLocaleTimeString();
  if (input.includes("date")) return new Date().toDateString();

  return null;
}

// 🔎 Search
async function search(query) {
  try {
    const res = await fetch(`https://api.duckduckgo.com/?q=${query}&format=json`);
    const data = await res.json();
    return data.Abstract || "No result found.";
  } catch {
    return "Search failed (no internet).";
  }
}

async function send() {
  const inputBox = document.getElementById("input");
  const text = inputBox.value;

  if (!text) return;

  add("You: " + text, "user");

  let reply = brain(text);

  if (!reply) {
    add("🔎 Searching...", "bot");
    reply = await search(text);
  }

  add("AstraQuant: " + reply, "bot");

  inputBox.value = "";
}

// Enter key support
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
